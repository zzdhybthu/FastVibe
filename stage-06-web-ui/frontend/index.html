<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>VibeCoding Manager</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ====================================================================
     Auth Screen
     ==================================================================== -->
<div id="auth-screen" class="auth-screen" style="display: none;">
    <div class="auth-card">
        <h2>VibeCoding Manager</h2>
        <p style="color: var(--text-secondary); margin-bottom: var(--spacing-lg);">
            Enter your auth token to continue.
        </p>
        <div class="form-group">
            <label for="token-input">Auth Token</label>
            <input type="password" id="token-input" placeholder="Enter token..." autocomplete="off">
        </div>
        <button id="login-btn" class="btn btn-primary">Login</button>
    </div>
</div>

<!-- ====================================================================
     Main App
     ==================================================================== -->
<div id="app-main" class="app-container" style="display: none;">

    <!-- Header -->
    <header class="app-header">
        <div class="header-top">
            <div class="app-title">Vibe<span>Coding</span> Manager</div>
            <div class="connection-status">
                <div class="status-dot"></div>
                <span class="status-text">Disconnected</span>
            </div>
        </div>

        <!-- Tab Navigation -->
        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="tasks">
                Tasks <span class="badge">0</span>
            </button>
            <button class="tab-btn" data-tab="instances">
                Instances <span class="badge">0</span>
            </button>
            <button class="tab-btn" data-tab="logs">
                Logs
            </button>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content">

        <!-- ============================================================
             Tasks Panel
             ============================================================ -->
        <section id="panel-tasks" class="tab-panel active">

            <!-- Task Submit Form -->
            <form class="task-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="task-prompt">Prompt</label>
                    <textarea id="task-prompt" placeholder="Enter your prompt for Claude Code..." rows="4"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-title">Title (optional)</label>
                        <input type="text" id="task-title" placeholder="Task title">
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="0">Normal (0)</option>
                            <option value="1">Low (1)</option>
                            <option value="2">Medium (2)</option>
                            <option value="3">High (3)</option>
                        </select>
                    </div>
                </div>
                <button type="button" id="submit-btn" class="btn btn-primary">Submit Task</button>
            </form>

            <!-- Task List -->
            <div id="task-list" class="task-list">
                <div class="empty-state">
                    <div class="empty-state-icon">&#9634;</div>
                    <div class="empty-state-text">No tasks yet. Submit a prompt above to get started.</div>
                </div>
            </div>

        </section>

        <!-- ============================================================
             Instances Panel
             ============================================================ -->
        <section id="panel-instances" class="tab-panel">
            <div id="instance-list" class="instance-list">
                <div class="empty-state">
                    <div class="empty-state-icon">&#9881;</div>
                    <div class="empty-state-text">No running instances. Submit a task to start one.</div>
                </div>
            </div>
        </section>

        <!-- ============================================================
             Logs Panel
             ============================================================ -->
        <section id="panel-logs" class="tab-panel">
            <div class="log-controls">
                <select id="log-instance-select">
                    <option value="">-- Select Instance --</option>
                </select>
                <button id="clear-logs-btn" class="btn btn-secondary">Clear</button>
            </div>
            <div id="log-output" class="log-container">
                <div class="log-line info">[Select an instance to view logs]</div>
            </div>
        </section>

    </main>
</div>

<!-- Toast container -->
<div class="toast-container"></div>

<!-- Scripts -->
<script src="/js/websocket.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
