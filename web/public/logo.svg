<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="brandFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <clipPath id="circleClip"><circle cx="256" cy="256" r="215"/></clipPath>
    <clipPath id="leftClip">
      <path d="M256,0 L226,134 L288,164 L206,268 L278,298 L246,512 L0,512 L0,0 Z"/>
    </clipPath>
    <mask id="vCutout">
      <rect width="512" height="512" fill="white"/>
      <g transform="rotate(8, 256, 256)">
        <g transform="translate(130, 112) scale(2.58)">
          <path d="M0,0 L44,98 L56,98 L84,42 L76,38 L98,0 Z M18,0 L64,0 L48,38 L56,42 L48,92 Z"
                fill="black" fill-rule="evenodd"/>
        </g>
      </g>
    </mask>
  </defs>

  <!-- Right half: blue with V cutout -->
  <path d="M256,0 L226,134 L288,164 L206,268 L278,298 L246,512 L512,512 L512,0 Z"
        clip-path="url(#circleClip)" fill="url(#brandFill)" mask="url(#vCutout)"/>

  <!-- Left half: blue V only -->
  <g clip-path="url(#circleClip)">
    <g clip-path="url(#leftClip)">
      <g transform="rotate(8, 256, 256)">
        <g transform="translate(130, 112) scale(2.58)">
          <path d="M0,0 L44,98 L56,98 L84,42 L76,38 L98,0 Z M18,0 L64,0 L48,38 L56,42 L48,92 Z"
                fill="url(#brandFill)" fill-rule="evenodd"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Sketch arc on left side -->
  <path d="M 152,451 A 220,220 0 0 1 92,108" stroke="#6366f1" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.4" transform="rotate(-10, 256, 256)"/>
</svg>
