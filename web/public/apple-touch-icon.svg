<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="goldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c030"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="90" cy="90" r="75"/>
    </clipPath>
  </defs>

  <path d="M90,0 L79,47 L101,58 L72,94 L98,105 L86,180 L0,180 L0,0 Z"
        clip-path="url(#circleClip)" fill="#1a1a1a"/>
  <path d="M90,0 L79,47 L101,58 L72,94 L98,105 L86,180 L180,180 L180,0 Z"
        clip-path="url(#circleClip)" fill="url(#goldFill)"/>
  <path d="M90,15 L79,47 L101,58 L72,94 L98,105 L86,165"
        clip-path="url(#circleClip)"
        stroke="#ffe680" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Sketch arc on left side -->
  <path d="M 42,152 A 78,78 0 0 1 42,29" stroke="#b8860b" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <g transform="rotate(8, 90, 90)">
    <g transform="translate(46, 40) scale(0.90)">
      <path d="M0,0 L44,98 L56,98 L84,42 L76,38 L98,0 Z M18,0 L64,0 L48,38 L56,42 L48,92 Z"
            fill="#ffffff" fill-rule="evenodd" opacity="0.95"/>
    </g>
  </g>
