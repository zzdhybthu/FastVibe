<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="blueFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <clipPath id="circleClip"><circle cx="90" cy="90" r="75"/></clipPath>
    <clipPath id="leftClip">
      <path d="M90,0 L79,47 L101,58 L72,94 L98,105 L86,180 L0,180 L0,0 Z"/>
    </clipPath>
    <mask id="vCutout">
      <rect width="180" height="180" fill="white"/>
      <g transform="rotate(8, 90, 90)">
        <g transform="translate(46, 40) scale(0.90)">
          <path d="M0,0 L44,98 L56,98 L84,42 L76,38 L98,0 Z M18,0 L64,0 L48,38 L56,42 L48,92 Z"
                fill="black" fill-rule="evenodd"/>
        </g>
      </g>
    </mask>
  </defs>

  <!-- Right half: blue with V cutout -->
  <path d="M90,0 L79,47 L101,58 L72,94 L98,105 L86,180 L180,180 L180,0 Z"
        clip-path="url(#circleClip)" fill="url(#blueFill)" mask="url(#vCutout)"/>

  <!-- Left half: blue V only -->
  <g clip-path="url(#circleClip)">
    <g clip-path="url(#leftClip)">
      <g transform="rotate(8, 90, 90)">
        <g transform="translate(46, 40) scale(0.90)">
          <path d="M0,0 L44,98 L56,98 L84,42 L76,38 L98,0 Z M18,0 L64,0 L48,38 L56,42 L48,92 Z"
                fill="url(#blueFill)" fill-rule="evenodd"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Sketch arc on left side -->
  <path d="M 42,151 A 77,77 0 0 1 42,29" stroke="#3b82f6" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
