<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="brandFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <clipPath id="circleClip"><circle cx="16" cy="16" r="13.5"/></clipPath>
    <clipPath id="leftClip">
      <path d="M16,0 L14.2,8.4 L17.8,10.2 L13,16.8 L17.4,18.8 L15.4,32 L0,32 L0,0 Z"/>
    </clipPath>
    <mask id="vCutout">
      <rect width="32" height="32" fill="white"/>
      <g transform="rotate(8, 16, 16)">
        <g transform="translate(8.2, 7) scale(0.16)">
          <path d="M0,0 L44,98 L56,98 L84,42 L76,38 L98,0 Z M18,0 L64,0 L48,38 L56,42 L48,92 Z"
                fill="black" fill-rule="evenodd"/>
        </g>
      </g>
    </mask>
  </defs>

  <g transform="rotate(30, 16, 16)">
  <!-- Right half: blue with V cutout -->
  <path d="M16,0 L14.2,8.4 L17.8,10.2 L13,16.8 L17.4,18.8 L15.4,32 L32,32 L32,0 Z"
        clip-path="url(#circleClip)" fill="url(#brandFill)" mask="url(#vCutout)"/>

  <!-- Left half: blue V only -->
  <g clip-path="url(#circleClip)">
    <g clip-path="url(#leftClip)">
      <g transform="rotate(8, 16, 16)">
        <g transform="translate(8.2, 7) scale(0.16)">
          <path d="M0,0 L44,98 L56,98 L84,42 L76,38 L98,0 Z M18,0 L64,0 L48,38 L56,42 L48,92 Z"
                fill="url(#brandFill)" fill-rule="evenodd"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Sketch arc on left side -->
  <path d="M 9.5,28.3 A 14,14 0 0 1 5.7,6.7" stroke="#6366f1" stroke-width="0.5" fill="none" stroke-linecap="round" opacity="0.4" transform="rotate(-10, 16, 16)"/>
  </g>
</svg>
