<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 150" fill="none">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="boltL" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="boltR" x1="0.7" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Logo icon -->
  <g transform="translate(110, 18)">
    <rect width="114" height="114" rx="26" fill="url(#accent)"/>
    <!-- Two lightning bolts forming a V shape -->
    <!-- Left bolt -->
    <path d="M22,8 L38,44 L28,44 L50,100 L40,90 L24,52 L34,52 Z" fill="url(#boltL)"/>
    <!-- Right bolt -->
    <path d="M92,8 L76,44 L86,44 L64,100 L74,90 L90,52 L80,52 Z" fill="url(#boltR)"/>
  </g>

  <!-- Title -->
  <text x="244" y="78" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#4f46e5" letter-spacing="-1">
    FastVibe
  </text>

  <!-- Tagline -->
  <text x="246" y="108" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" fill="#7c3aed" letter-spacing="0.5" opacity="0.85">
    Claude Code Orchestration Hub
  </text>
</svg>
