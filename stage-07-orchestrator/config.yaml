orchestrator:
  max_instances: 3
  task_timeout: 300  # seconds
  health_check_interval: 30
  max_retries: 2
  stall_timeout: 120  # 无输出超过此时间认为卡死

cc:
  command: "claude"
  output_format: "stream-json"
  verbose: true
  dangerously_skip_permissions: true

queue:
  type: "directory"  # directory or sqlite
  path: "../stage-03-ralph-loop/task-queue"

logging:
  level: "INFO"
  dir: "./logs"
