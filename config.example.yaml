server:
  port: 8420
  host: '0.0.0.0'
  authToken: 'change-me-to-a-secret-token'

global:
  maxTotalConcurrency: 5

defaultAgent: 'claude-code'  # 'claude-code' or 'codex'

claude:
  model:
    - 'claude-opus-4-6'
    - 'claude-sonnet-4-6'
    - 'claude-haiku-4-5-20251001'
  maxBudgetUsd: 1000.0
  interactionTimeout: 86400

codex:
  model:
    - 'gpt-5.3-codex'
    - 'gpt-5.2-codex'
