<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#6366f1"/>
      <stop offset="80%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8b5cf6"/>
      <stop offset="70%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="15%" stop-color="#6366f1"/>
      <stop offset="90%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Parallel task bars (right side decoration) -->
  <g opacity="0.5">
    <rect x="520" y="58" width="230" height="6" rx="3" fill="url(#bar1)"/>
    <rect x="540" y="78" width="200" height="6" rx="3" fill="url(#bar2)"/>
    <rect x="510" y="98" width="250" height="6" rx="3" fill="url(#bar3)"/>
    <rect x="550" y="118" width="180" height="6" rx="3" fill="url(#bar1)"/>
    <rect x="525" y="138" width="220" height="6" rx="3" fill="url(#bar2)"/>
  </g>

  <!-- Dots at bar ends (task nodes) -->
  <g>
    <circle cx="520" cy="61" r="3" fill="#6366f1" opacity="0.8"/>
    <circle cx="750" cy="61" r="3" fill="#818cf8" opacity="0.6"/>
    <circle cx="540" cy="81" r="3" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="740" cy="81" r="3" fill="#a78bfa" opacity="0.6"/>
    <circle cx="510" cy="101" r="3" fill="#6366f1" opacity="0.8"/>
    <circle cx="760" cy="101" r="3" fill="#818cf8" opacity="0.6"/>
    <circle cx="550" cy="121" r="3" fill="#6366f1" opacity="0.8"/>
    <circle cx="730" cy="121" r="3" fill="#818cf8" opacity="0.6"/>
    <circle cx="525" cy="141" r="3" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="745" cy="141" r="3" fill="#a78bfa" opacity="0.6"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(100, 55)">
    <rect width="90" height="90" rx="20" fill="url(#accent)"/>
    <path d="M52 16L30 52h14l-7 22 28-36h-17l7-22z" fill="url(#bolt)"/>
  </g>

  <!-- Title -->
  <text x="210" y="98" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#f8fafc" letter-spacing="-1">
    FastVibe
  </text>

  <!-- Tagline -->
  <text x="212" y="128" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#a5b4fc" letter-spacing="0.5">
    Claude Code Orchestration Hub
  </text>
</svg>
